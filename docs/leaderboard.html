<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OctoNode Cup Leaderboard</title>
  <link rel="stylesheet" href="leaderboard.css">
</head>
<body>

<div class="wrap">

<header class="wrap">
    <div class="title-row">
      <h1><span class="trophy">🏆</span> GNN Mini Competition Leaderboard <span class="trophy">🏆</span></h1>
      <p class="sub black-text">GitHub Social Network classification • Web Dev vs ML Dev</p>
    </div>
  </header>

<div class="card">
  <div class="controls">
    <div class="control">
      <label>Search</label>
      <input id="search" type="search" placeholder="Search team...">
    </div>

    <div class="control">
      <label>Date</label>
      <select id="dateFilter">
        <option value="all">All</option>
        <option value="last30">Last 30 days</option>
        <option value="last180">Last 180 days</option>
      </select>
    </div>
  </div>

  <div class="column-actions">
    <div id="columnToggles"></div>
    <button id="showAllCols">Show All</button>
    <button id="hideAllCols">Hide All</button>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-key="rank">Rank</th>
          <th data-key="team">Team</th>
          <th data-key="score">Score</th>
          <th data-key="timestamp_utc">Date (UTC)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="foot">
    <span id="status"></span>
  </div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="icon">👥</div>
    <div id="statParticipants" class="value">–</div>
    <div class="label">Participants</div>
  </div>

  <div class="stat-card">
    <div class="icon">🥇</div>
    <div id="statBest" class="value">–</div>
    <div class="label">Best Score</div>
  </div>

  <div class="stat-card">
    <div class="icon">📊</div>
    <div id="statAvg" class="value">–</div>
    <div class="label">Average Score</div>
  </div>
</div>

</div>

<script src="leaderboard.js"></script>

</body>
</html>
